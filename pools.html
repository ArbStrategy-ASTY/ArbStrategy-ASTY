* { box-sizing:border-box; }

body {
margin:0;
font-family:Inter, Arial;
background:linear-gradient(180deg,#0b1020,#060914);
color:#fff;
}

.container { max-width:1200px; margin:auto; padding:0 20px; }

.topbar {
position:sticky;
top:0;
background:rgba(8,11,23,0.8);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.08);

.nav {
display:flex;
justify-content:space-between;
align-items:center;
height:70px;
}

.brand { display:flex; gap:12px; align-items:center; }
.brand-logo { width:44px; border-radius:50%; }

.nav-links a {
margin-left:16px;
color:#d8ccff;
text-decoration:none;
}

.effect-slogan { margin-top:20px; color:#d8ccff; font-weight:600; }
.effect-sub { font-size:13px; color:#aaa; }
.auto-update { font-size:12px; color:#888; margin-top:6px; }

.summary-grid {
margin-top:18px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.summary-card {
padding:16px;
background:rgba(255,255,255,0.04);
border-radius:14px;
}

.summary-value {
font-size:26px;
font-weight:700;
animation:pulse 3s infinite;
}

@keyframes pulse {
0%,100%{opacity:1;}
50%{opacity:0.85;}
}

.table-box {
margin-top:22px;
border:1px solid rgba(255,255,255,0.08);
border-radius:16px;
overflow:auto;
max-height:70vh;
}

table {
width:100%;
min-width:900px;
border-collapse:collapse;
}

th, td {
padding:12px;
text-align:left;
}

thead th {
position:sticky;
top:0;
background:#0b1020;
}

tbody tr {
border-top:1px solid rgba(255,255,255,0.05);
}

tbody tr:first-child {
background:rgba(167,139,250,0.08);
}

function fmt(n){
if(!n) return "-";
if(n>1e6) return "$"+(n/1e6).toFixed(1)+"M";
if(n>1e3) return "$"+(n/1e3).toFixed(1)+"K";
return "$"+n.toFixed(2);
}

async function load(){
const res = await Promise.all(pools.map(async p=>{
const r = await fetch(`https://api.dexscreener.com/latest/dex/pairs/solana/${p[0]}`);
const d = await r.json();
const pair = d.pairs[0];

const fee = p[2]/100;

return {
label:p[1],
id:p[0],
fee,
liq:pair.liquidity.usd,
v24:pair.volume.h24,
v1:pair.volume.h1,
f24:pair.volume.h24 * fee,
f1:pair.volume.h1 * fee
};
}));

res.sort((a,b)=>b.f24-a.f24);

let t24=0;

document.getElementById("tableBody").innerHTML = res.map(r=>{
t24+=r.f24;

return `
<tr>
<td>${r.label}</td>
<td>${(r.fee*100).toFixed(2)}%</td>
<td>${fmt(r.liq)}</td>
<td>${fmt(r.f1)}</td>
<td>${fmt(r.f24)}</td>
<td>${fmt(r.v24)}</td>
<td><a href="https://dexscreener.com/solana/${r.id}" target="_blank">🟣</a></td>
</tr>
`;
}).join("");

document.getElementById("fees24h").innerText = fmt(t24);
document.getElementById("topPool").innerText = res[0].label;
document.getElementById("topPoolVal").innerText = fmt(res[0].f24);
}
