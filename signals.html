<!DOCTYPE html>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:
    radial-gradient(circle at top,rgba(124,58,237,.28),transparent 30%),
    radial-gradient(circle at 80% 10%,rgba(167,139,250,.13),transparent 24%),
    linear-gradient(180deg,#0b1020 0%,#060914 100%);
  color:#fff;
  min-height:100vh;
  padding:22px;
}

.wrap{max-width:980px;margin:auto}

.card{
  background:rgba(255,255,255,.045);
  border:1px solid rgba(167,139,250,.22);
  border-radius:28px;
  padding:24px;
  box-shadow:0 0 46px rgba(124,58,237,.22);
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:18px;
}

.brand img{
  width:52px;
  height:52px;
  border-radius:50%;
  box-shadow:0 0 26px rgba(167,139,250,.5);
}

h1{
  margin:0;
  font-size:34px;
  letter-spacing:-.5px;
}

.sub{
  color:#c4b5fd;
  margin-top:4px;
  font-size:14px;
}

canvas{
  width:100%;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.1);
  background:#05050b;
  box-shadow:0 0 34px rgba(124,58,237,.18);
}

textarea{
  margin-top:16px;
  width:100%;
  min-height:190px;
  border-radius:18px;
  border:1px solid rgba(167,139,250,.3);
  background:#080b18;
  color:#fff;
  padding:16px;
  font-size:15px;
  line-height:1.5;
  resize:vertical;
}

.buttons{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-top:16px;
}

button{
  border:0;
  border-radius:999px;
  padding:13px 18px;
  cursor:pointer;
  font-weight:800;
  color:#fff;
  background:linear-gradient(135deg,#8b5cf6,#6d28d9);
  box-shadow:0 0 22px rgba(168,85,247,.26);
  transition:all .12s ease;
}

button:hover{
  transform:translateY(-2px) scale(1.03);
  box-shadow:0 0 38px rgba(168,85,247,.55);
  filter:brightness(1.12);
}

button:active{
  transform:scale(.90);
  box-shadow:0 0 18px rgba(168,85,247,.3);
}

button.clicked{
  animation:buttonPop .42s ease;
}

@keyframes buttonPop{
  0%{transform:scale(.88)}
  35%{transform:scale(1.13)}
  65%{transform:scale(.97)}
  100%{transform:scale(1)}
}

.status{
  margin-top:14px;
  color:#c4b5fd;
  font-size:14px;
}
</style>
</head>

const TG_LINK = "https://t.me/ArbStrategyASTY/1";
const CHUNK_SIZE = 25;
const canvas = document.getElementById("signalCanvas");
const ctx = canvas.getContext("2d");
const postText = document.getElementById("postText");
const statusEl = document.getElementById("status");

function setStatus(t){ statusEl.textContent = t; }

function pressEffect(el){
  if(!el) return;
  el.classList.remove("clicked");
  void el.offsetWidth;
  el.classList.add("clicked");
}

function chunkArray(arr,size){
  const chunks=[];
  for(let i=0;i<arr.length;i+=size) chunks.push(arr.slice(i,i+size));
  return chunks;
}

function fmtUsd(n){
  if(!n || Number.isNaN(n)) return "$0.00";
  if(n >= 1e9) return "$" + (n/1e9).toFixed(2) + "B";
  if(n >= 1e6) return "$" + (n/1e6).toFixed(2) + "M";
  if(n >= 1e3) return "$" + (n/1e3).toFixed(2) + "K";
  return "$" + n.toFixed(2);
}

function cleanPoolName(label){
  return label.replace("/", " / ");
}

function getPoolToken(label){
  const parts = label.split("/");
  const raw = (parts[1] || parts[0] || "DeFi").trim();
  return raw.replace(/[^a-zA-Z0-9]/g,"");
}

function buildHashtags(poolToken){
  const tokenTag = poolToken || "SOL";
  return `#ArbStrategy #ArbiTrage $${tokenTag} #DeFi`;
}

function limitText(str, max = 280){
  return str.length <= max ? str : str.slice(0, max - 3) + "...";
}

}

async function fetchGeckoChunk(chunk){
  const ids = chunk.map(([id]) => id).join(",");
  const url = `https://api.geckoterminal.com/api/v2/networks/solana/pools/multi/${encodeURIComponent(ids)}?include=base_token&include_volume_breakdown=false&include_composition=false`;
  const res = await fetch(url);
  const json = await res.json();
  return Array.isArray(json.data) ? json.data : [];
}

async function loadPoolData(){
  const chunks = chunkArray(pools, CHUNK_SIZE);
  const responses = await Promise.all(chunks.map(fetchGeckoChunk));
  const flat = responses.flat();

  const map = new Map();
  for(const item of flat){
    const address = item?.attributes?.address;
    if(address) map.set(address, item);
  }

  return pools.map(([id,label,feePercent])=>{
    const item = map.get(id);
    if(!item) return null;

    const attrs = item.attributes || {};
    const volume24h = parseFloat(attrs.volume_usd?.h24 || "0");
    const tvl = parseFloat(attrs.reserve_in_usd || "0");
    const feeRate = feePercent / 100;
    const fees24h = volume24h * feeRate;
    const efficiency = tvl > 0 ? fees24h / tvl : 0;

    return {
      id,
      label: cleanPoolName(label),
      rawLabel: label,
      poolToken: getPoolToken(label),
      feePercent,
      volume24h,
      tvl,
      fees24h,
      efficiency
    };
  }).filter(Boolean);
}

async function generateSignal(e){
  if(e) pressEffect(e.currentTarget);
  setStatus("Loading GeckoTerminal pool data...");

  let rows = [];

  try{
    rows = await loadPoolData();
  }catch(err){
    console.error(err);
    setStatus("API error. Could not load pool data.");
    return;
  }

  if(!rows.length){
    setStatus("No pool data available.");
    return;
  }

  rows.sort((a,b)=>b.fees24h-a.fees24h);

  const topPool = rows[0];
  const totalFees = rows.reduce((s,p)=>s+p.fees24h,0);
  const totalVolume = rows.reduce((s,p)=>s+p.volume24h,0);

  const efficiencySorted = [...rows].sort((a,b)=>b.efficiency-a.efficiency);
  const benchmark = efficiencySorted[0].efficiency || 1;

  const ranked = efficiencySorted.map(p=>({
    ...p,
    rel: Math.round((p.efficiency / benchmark) * 100)
  }));

  const above75 = ranked.filter(p=>p.rel >= 75).length;
  const above50 = ranked.filter(p=>p.rel >= 50).length;

  let signal = "EFFICIENCY CONCENTRATION";
  let flow = "FOCUSED";

  if(above75 >= 3){
    signal = "DISTRIBUTED STRENGTH";
    flow = "WIDE";
  }else if(above50 >= 4){
    signal = "MULTI POOL MOMENTUM";
    flow = "EXPANDING";
  }

  const burn = totalFees > 0 ? "ACTIVE" : "WAITING";
  const hashtags = buildHashtags(topPool.poolToken);

  const text = pickPostText({
    signal,
    topPool: topPool.label,
    fees: fmtUsd(totalFees),
    volume: fmtUsd(totalVolume),
    burn,
    flow,
    hashtags
  });

  postText.value = text;

  await drawCanvas({
    signal,
    topPool: topPool.label,
    fees: fmtUsd(totalFees),
    volume: fmtUsd(totalVolume),
    burn,
    flow,
    hashtags
  });

  setStatus(`Signal generated from ${rows.length} live pools. X text: ${text.length}/280 characters.`);
}

function loadImage(src){
  return new Promise(resolve=>{
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = ()=>resolve(img);
    img.onerror = ()=>resolve(null);
    img.src = src;
  });
}

function drawImageContain(img,x,y,w,h,alpha=1){
  if(!img) return;

  const ratio = Math.min(w / img.width, h / img.height);
  const newW = img.width * ratio;
  const newH = img.height * ratio;
  const offsetX = x + (w - newW) / 2;
  const offsetY = y + (h - newH) / 2;

  ctx.globalAlpha = alpha;
  ctx.drawImage(img, offsetX, offsetY, newW, newH);
  ctx.globalAlpha = 1;
}

async function drawCanvas(data){
  const logo = await loadImage(ASSET_BASE + "logo.png");
  const wolf = await loadImage(ASSET_BASE + "wolf.png");

  ctx.clearRect(0,0,1200,675);

  const bg = ctx.createLinearGradient(0,0,1200,675);
  bg.addColorStop(0,"#17062b");
  bg.addColorStop(.48,"#070914");
  bg.addColorStop(1,"#13071f");
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,1200,675);

  ctx.shadowColor = "#a855f7";
  ctx.shadowBlur = 110;
  ctx.fillStyle = "rgba(168,85,247,.22)";
  ctx.beginPath();
  ctx.arc(950,130,270,0,Math.PI*2);
  ctx.fill();

  ctx.shadowBlur = 85;
  ctx.fillStyle = "rgba(124,58,237,.18)";
  ctx.beginPath();
  ctx.arc(155,565,190,0,Math.PI*2);
  ctx.fill();

  ctx.shadowBlur = 0;

  ctx.strokeStyle = "rgba(167,139,250,.22)";
  ctx.lineWidth = 2;
  roundRect(42,36,1116,603,34,false);

  drawImageContain(wolf, 875, 410, 260, 210, .32);

  if(logo){
    ctx.drawImage(logo, 1028, 46, 104, 104);
  }

  ctx.fillStyle = "#c4b5fd";
  ctx.font = "900 32px Arial";
  ctx.fillText("🟣 ASTY SYSTEM SIGNAL",70,88);

  ctx.fillStyle = "#a78bfa";
  ctx.font = "700 22px Arial";
  ctx.fillText("ArbStrategy Intelligence",70,122);

  ctx.fillStyle = "#ffffff";
  ctx.font = "900 56px Arial";
  wrapText(data.signal,70,210,760,62);

  ctx.fillStyle = "#a855f7";
  ctx.font = "900 26px Arial";
  ctx.fillText("LIVE 24H POOL SNAPSHOT",70,325);

  drawMetric("Top Pool",data.topPool,70,405);
  drawMetric("System Output",data.fees,70,500);
  drawMetric("Burn Engine",data.burn,570,405);
  drawMetric("Capital Flow",data.flow,570,500);

  ctx.fillStyle = "#ffffff";
  ctx.font = "900 29px Arial";
  ctx.fillText("$ASTY is doing what it was built for.",70,590);

  ctx.fillStyle = "#8b5cf6";
  ctx.font = "800 20px Arial";
  ctx.fillText(data.hashtags.replaceAll("#"," #").trim(),70,625);
}

function drawMetric(label,value,x,y){
  ctx.fillStyle = "rgba(255,255,255,.07)";
  roundRect(x,y-52,410,82,22,true);

  ctx.strokeStyle = "rgba(167,139,250,.18)";
  ctx.lineWidth = 1;
  roundRect(x,y-52,410,82,22,false);

  ctx.fillStyle = "#c4b5fd";
  ctx.font = "800 19px Arial";
  ctx.fillText(label,x+24,y-18);

  ctx.fillStyle = "#ffffff";
  ctx.font = "900 29px Arial";

  let shown = value;
  if(ctx.measureText(shown).width > 340){
    while(ctx.measureText(shown + "...").width > 340 && shown.length > 4){
      shown = shown.slice(0,-1);
    }
    shown += "...";
  }

  ctx.fillText(shown,x+24,y+19);
}

function roundRect(x,y,w,h,r,fill){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
  if(fill) ctx.fill();
  else ctx.stroke();
}

function wrapText(text,x,y,maxWidth,lineHeight){
  const words = text.split(" ");
  let line = "";
  for(const word of words){
    const test = line + word + " ";
    if(ctx.measureText(test).width > maxWidth){
      ctx.fillText(line,x,y);
      line = word + " ";
      y += lineHeight;
    }else{
      line = test;
    }
  }
  ctx.fillText(line,x,y);
}

async function copyText(e){
  pressEffect(e.currentTarget);
  await navigator.clipboard.writeText(postText.value);
  setStatus(`X post copied. ${postText.value.length}/280 characters.`);
}

function downloadImage(e){
  pressEffect(e.currentTarget);

  canvas.toBlob(blob=>{
    if(!blob){
      setStatus("Download blocked. Use the real GitHub Pages URL instead of HTML Preview.");
      return;
    }

    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");

    link.href = url;
    link.download = "asty-system-signal.png";
    link.style.display = "none";

    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    setTimeout(()=>URL.revokeObjectURL(url),1000);

    setStatus("Image download started.");
  }, "image/png");
}

generateSignal();
