<style>
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:#060914;
  color:#fff;
  min-height:100vh;
}
a{text-decoration:none;color:inherit}

body{
  background:
    radial-gradient(circle at top,rgba(124,58,237,.24),transparent 32%),
    radial-gradient(circle at 80% 18%,rgba(167,139,250,.12),transparent 24%),
    linear-gradient(180deg,#0b1020 0%,#060914 100%);
}

.topbar{
  position:sticky;
  top:0;
  z-index:30;
  backdrop-filter:blur(14px);
  background:rgba(8,11,23,.82);
  border-bottom:1px solid rgba(255,255,255,.08);
}

.nav{
  max-width:1240px;
  margin:auto;
  padding:14px 18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
}

.brand-logo{
  width:46px;
  height:46px;
  border-radius:50%;
  box-shadow:0 0 28px rgba(124,58,237,.45);
  animation:pulseGlow 3s ease-in-out infinite;
}

@keyframes pulseGlow{
  0%,100%{filter:drop-shadow(0 0 10px rgba(124,58,237,.35))}
  50%{filter:drop-shadow(0 0 24px rgba(167,139,250,.65))}
}

.brand-title{
  font-size:20px;
  font-weight:900;
}

.brand-sub{
  font-size:12px;
  color:#b8b0d1;
  margin-top:2px;
}

.nav-links{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.nav-pill{
  padding:9px 13px;
  border-radius:999px;
  font-size:13px;
  font-weight:700;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(167,139,250,.25);
  color:#dad6ea;
  transition:.2s ease;
}

.nav-pill:hover{
  transform:translateY(-1px);
  background:rgba(255,255,255,.08);
  color:#fff;
}

.nav-pill.primary{
  background:linear-gradient(135deg,#8b5cf6,#6d28d9);
  color:#fff;
}

.nav-pill.orange{
  background:linear-gradient(135deg,#f59e0b,#ea580c);
  color:#fff;
  border-color:transparent;
}

.nav-pill.cyan{
  background:linear-gradient(135deg,#06b6d4,#0891b2);
  color:#fff;
  border-color:transparent;
}

.page{
  max-width:1240px;
  margin:auto;
  padding:22px 18px 42px;
}

.header-grid{
  display:grid;
  grid-template-columns:1.2fr .8fr;
  gap:14px;
  margin-bottom:16px;
}

.info-card,.stat{
  border-radius:20px;
  padding:16px 18px;
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(12px);
}

.info-card h1{
  margin:0;
  font-size:32px;
  letter-spacing:-.7px;
}

.status-line{
  margin-top:10px;
  font-size:12px;
  color:#9f98bb;
}

.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.stat-label{
  font-size:12px;
  color:#c9b8ff;
  font-weight:800;
  margin-bottom:8px;
}

.stat-value{
  font-size:21px;
  font-weight:900;
  line-height:1.12;
}

.map-wrap{
  position:relative;
  border-radius:22px;
  overflow:hidden;
  background:#050814;
  border:1px solid rgba(255,255,255,.09);
  box-shadow:0 0 40px rgba(124,58,237,.12);
}

#treemap{
  position:relative;
  width:100%;
  height:690px;
  background:#050814;
  overflow:hidden;
}

.tile{
  position:absolute;
  overflow:hidden;
  border:1px solid rgba(5,8,20,.92);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  transition:filter .16s ease, transform .16s ease, box-shadow .16s ease;
}

.tile:hover{
  z-index:10;
  filter:brightness(1.14);
  box-shadow:0 0 24px rgba(255,255,255,.15);
}

.tile-inner{
  width:100%;
  height:100%;
  padding:8px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(circle at 30% 20%,rgba(255,255,255,.22),transparent 30%),
    linear-gradient(135deg,var(--c1),var(--c2));
}

.tile-token{
  font-weight:900;
  line-height:.95;
  letter-spacing:-.03em;
  font-size:var(--tokenSize);
  text-shadow:0 2px 10px rgba(0,0,0,.38);
  max-width:100%;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.tile-percent{
  margin-top:6px;
  font-weight:800;
  font-size:var(--percentSize);
  color:rgba(255,255,255,.86);
  text-shadow:0 2px 10px rgba(0,0,0,.38);
}

.tile-fees{
  margin-top:3px;
  font-weight:700;
  font-size:var(--feeSize);
  color:rgba(255,255,255,.72);
  text-shadow:0 2px 10px rgba(0,0,0,.38);

  border:1px solid rgba(255,255,255,.08);

.detail-title{

.detail-item{

.detail-label{

.detail-value{

.open-link{

const CHUNK_SIZE = 25;

function fmtUsd(n){
  if(!n || Number.isNaN(n)) return "$0.00";
  if(n >= 1e9) return "$" + (n / 1e9).toFixed(1) + "B";
  if(n >= 1e6) return "$" + (n / 1e6).toFixed(1) + "M";
  if(n >= 1e3) return "$" + (n / 1e3).toFixed(1) + "K";
  return "$" + n.toFixed(2);
}

function formatFee(percentValue){
  return percentValue.toFixed(2).replace(/\.00$/,"") + "%";
}

function getTokenName(label){
  return label.replace("ASTY/","").replace("ASTY / ","");
}

function chunkArray(arr,size){
  const chunks=[];
  for(let i=0;i<arr.length;i+=size) chunks.push(arr.slice(i,i+size));
  return chunks;
}

async function fetchGeckoChunk(chunk){
  const ids = chunk.map(([id]) => id).join(",");
  const encodedIds = encodeURIComponent(ids);
  const url = `https://api.geckoterminal.com/api/v2/networks/solana/pools/multi/${encodedIds}?include=base_token&include_volume_breakdown=false&include_composition=false`;
  const response = await fetch(url);
  const data = await response.json();
  return Array.isArray(data.data) ? data.data : [];
}

function getColors(score){
  if(score >= 80) return ["#ef4444","#f97316"];
  if(score >= 50) return ["#f59e0b","#c2410c"];
  if(score >= 20) return ["#8b5cf6","#6d28d9"];
  return ["#312e81","#1e1b4b"];
}

function normalizeSizes(items){
  const minValue = 0.25;
  return items.map(item => ({
    ...item,
    layoutValue: Math.max(item.chaosScore, minValue)
  }));
}

function worstRatio(row, w){
  if(!row.length) return Infinity;
  const sum = row.reduce((a,b)=>a+b.layoutValue,0);
  const max = Math.max(...row.map(i=>i.layoutValue));
  const min = Math.min(...row.map(i=>i.layoutValue));
  return Math.max((w*w*max)/(sum*sum), (sum*sum)/(w*w*min));
}

function layoutRow(row, rect, horizontal, result){
  const sum = row.reduce((a,b)=>a+b.layoutValue,0);

  if(horizontal){
    const rowH = sum / rect.w;
    let x = rect.x;

    row.forEach(item=>{
      const itemW = item.layoutValue / rowH;
      result.push({...item,x,y:rect.y,w:itemW,h:rowH});
      x += itemW;
    });

    rect.y += rowH;
    rect.h -= rowH;
  }else{
    const colW = sum / rect.h;
    let y = rect.y;

    row.forEach(item=>{
      const itemH = item.layoutValue / colW;
      result.push({...item,x:rect.x,y,w:colW,h:itemH});
      y += itemH;
    });

    rect.x += colW;
    rect.w -= colW;
  }
}

function squarify(items, width, height){
  const total = items.reduce((a,b)=>a+b.layoutValue,0);
  const area = width * height;

  const scaled = items.map(item=>({
    ...item,
    layoutValue:item.layoutValue / total * area
  }));

  const result = [];
  const rect = {x:0,y:0,w:width,h:height};
  let row = [];

  while(scaled.length){
    const item = scaled[0];
    const shortSide = Math.min(rect.w,rect.h);

    if(row.length === 0 || worstRatio(row.concat(item),shortSide) <= worstRatio(row,shortSide)){
      row.push(item);
      scaled.shift();
    }else{
      layoutRow(row,rect,rect.w >= rect.h,result);
      row = [];
    }
  }

  if(row.length){
    layoutRow(row,rect,rect.w >= rect.h,result);
  }

  return result;
}

function renderTreemap(rows){
  const container = document.getElementById("treemap");
  container.innerHTML = "";

  const width = container.clientWidth;
  const height = container.clientHeight;

  const data = normalizeSizes(rows);
  const layout = squarify(data,width,height);

  layout.forEach((item,index)=>{
    const tile = document.createElement("button");
    tile.className = "tile";

    const gap = 1;
    tile.style.left = item.x + gap + "px";
    tile.style.top = item.y + gap + "px";
    tile.style.width = Math.max(1,item.w - gap * 2) + "px";
    tile.style.height = Math.max(1,item.h - gap * 2) + "px";

    const [c1,c2] = getColors(item.chaosScore);
    tile.style.setProperty("--c1",c1);
    tile.style.setProperty("--c2",c2);

    const minSide = Math.min(item.w,item.h);
    const tokenSize = Math.max(8,Math.min(44,minSide * 0.22));
    const percentSize = Math.max(8,Math.min(24,minSide * 0.13));
    const feeSize = Math.max(0,Math.min(15,minSide * 0.09));

    tile.style.setProperty("--tokenSize",tokenSize + "px");
    tile.style.setProperty("--percentSize",percentSize + "px");
    tile.style.setProperty("--feeSize",feeSize + "px");

    const showFees = item.w > 90 && item.h > 70;
    const showPercent = item.w > 42 && item.h > 38;

    tile.innerHTML = `
      <div class="tile-inner">
        <div class="tile-token">${getTokenName(item.label)}</div>
        ${showPercent ? `<div class="tile-percent">${Math.round(item.chaosScore)}%</div>` : ""}
        ${showFees ? `<div class="tile-fees">${fmtUsd(item.fees24h)}</div>` : ""}
      </div>
    `;

    tile.addEventListener("click",()=>updatePanel(item));
    container.appendChild(tile);
  });
}

async function load(){
  const statusLine = document.getElementById("statusLine");
  statusLine.textContent = "Loading GeckoTerminal pool data...";

  try{
    const chunks = chunkArray(pools,CHUNK_SIZE);
    const responses = await Promise.all(chunks.map(fetchGeckoChunk));
    const flatPools = responses.flat();

    const geckoMap = new Map();
    for(const item of flatPools){
      const address = item?.attributes?.address;
      if(address) geckoMap.set(address,item);
    }

    let rows = pools.map(([id,label,feePercent])=>{
      const item = geckoMap.get(id);
      if(!item) return null;

      const attrs = item.attributes || {};
      const fee = feePercent / 100;
      const volume24h = parseFloat(attrs.volume_usd?.h24 || "0");
      const fees24h = volume24h * fee;

      return {id,label,feePercent,volume24h,fees24h};
    }).filter(Boolean).sort((a,b)=>b.fees24h-a.fees24h);

    const highest = rows[0]?.fees24h || 0;
    const total = rows.reduce((sum,row)=>sum + row.fees24h,0);

    rows = rows.map(row=>({
      ...row,
      chaosScore: highest > 0 ? (row.fees24h / highest) * 100 : 0
    }));

    document.getElementById("systemOutput").textContent = fmtUsd(total);
    document.getElementById("topPool").textContent = rows[0]?.label || "-";
    statusLine.textContent = `Loaded ${rows.length} ASTY pools. Auto-updating every 60s.`;

    renderTreemap(rows);
    updatePanel(rows[0]);

  }catch(error){
    console.error(error);
    statusLine.textContent = "Error loading GeckoTerminal data.";
  }
}

load();
setInterval(load,60000);
window.addEventListener("resize",()=>load());
</script>
