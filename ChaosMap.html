<title>$ASTY Chaos Map</title>

<style>
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:
    radial-gradient(circle at top,rgba(124,58,237,.24),transparent 32%),
    radial-gradient(circle at 80% 18%,rgba(167,139,250,.12),transparent 24%),
    linear-gradient(180deg,#0b1020 0%,#060914 100%);
  color:#fff;
  min-height:100vh;
}
a{text-decoration:none;color:inherit}

.topbar{
  position:sticky;
  top:0;
  z-index:20;
  backdrop-filter:blur(14px);
  background:rgba(8,11,23,.78);
  border-bottom:1px solid rgba(255,255,255,.08);
}
.nav{
  max-width:1220px;
  margin:auto;
  padding:14px 18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
}
.brand{
  display:flex;
  align-items:center;
  gap:14px;
}
.brand-logo{
  width:46px;
  height:46px;
  border-radius:50%;
  box-shadow:0 0 28px rgba(124,58,237,.45);
  animation:pulseGlow 3s ease-in-out infinite;
}
@keyframes pulseGlow{
  0%,100%{filter:drop-shadow(0 0 10px rgba(124,58,237,.35))}
  50%{filter:drop-shadow(0 0 24px rgba(167,139,250,.65))}
}
.brand-title{
  font-size:20px;
  font-weight:900;
}
.brand-sub{
  font-size:12px;
  color:#b8b0d1;
  margin-top:2px;
}
.nav-links{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}
.nav-pill{
  padding:9px 13px;
  border-radius:999px;
  font-size:13px;
  font-weight:700;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(167,139,250,.25);
  color:#dad6ea;
  transition:.2s ease;
}
.nav-pill:hover{
  transform:translateY(-1px);
  background:rgba(255,255,255,.08);
  color:#fff;
}
.nav-pill.primary{
  background:linear-gradient(135deg,#8b5cf6,#6d28d9);
  color:#fff;
}
.nav-pill.orange{
  background:linear-gradient(135deg,#f59e0b,#ea580c);
  color:#fff;
  border-color:transparent;
}
.nav-pill.cyan{
  background:linear-gradient(135deg,#06b6d4,#0891b2);
  color:#fff;
  border-color:transparent;
}

.page{
  max-width:1220px;
  margin:auto;
  padding:24px 18px 44px;
  position:relative;
}
.wolf{
  position:fixed;
  right:38px;
  top:118px;
  width:190px;
  opacity:.12;
  pointer-events:none;
  filter:drop-shadow(0 0 28px rgba(167,139,250,.45));
  z-index:0;
}
.header-panel{
  position:relative;
  z-index:2;
  display:grid;
  grid-template-columns:1.2fr .8fr;
  gap:14px;
  margin-bottom:18px;
}
.info-card{
  border-radius:22px;
  padding:18px 20px;
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(12px);
}
.info-card h1{
  margin:0;
  font-size:32px;
  letter-spacing:-.7px;
}
.status-line{
  margin-top:10px;
  font-size:12px;
  color:#9f98bb;
}
.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.stat{
  border-radius:20px;
  padding:16px;
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(12px);
}
.stat-label{
  font-size:12px;
  color:#c9b8ff;
  font-weight:800;
  margin-bottom:8px;
}
.stat-value{
  font-size:22px;
  font-weight:900;
  line-height:1.15;
}

.chaos-map{
  position:relative;
  z-index:2;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
  align-content:center;
  gap:8px;
  min-height:calc(100vh - 230px);
  padding:18px;
  border-radius:28px;
  background:
    linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px),
    rgba(255,255,255,.025);
  background-size:36px 36px;
  border:1px solid rgba(255,255,255,.07);
  backdrop-filter:blur(8px);
}
.block{
  flex:0 0 auto;
  width:var(--s);
  height:var(--s);
  border-radius:18px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  padding:8px;
  background:linear-gradient(135deg,var(--c1),var(--c2));
  border:1px solid rgba(255,255,255,.16);
  box-shadow:
    0 0 var(--glow) var(--glowColor),
    inset 0 0 28px rgba(255,255,255,.07);
  transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.block:hover{
  transform:translateY(-3px) scale(1.025);
  border-color:rgba(255,255,255,.34);
}
.block::before{
  content:"";
  position:absolute;
  inset:-40%;
  background:radial-gradient(circle at 30% 20%,rgba(255,255,255,.34),transparent 32%);
  opacity:.7;
  pointer-events:none;
}
.token{
  position:relative;
  z-index:1;
  font-weight:900;
  line-height:1;
  font-size:var(--tokenSize);
  word-break:break-word;
  max-width:100%;
  text-shadow:0 2px 10px rgba(0,0,0,.45);
}
.percent{
  position:relative;
  z-index:1;
  margin-top:6px;
  font-weight:900;
  font-size:var(--percentSize);
  color:rgba(255,255,255,.88);
  text-shadow:0 2px 10px rgba(0,0,0,.45);
}
.block.top{
  order:-100;
  border-radius:24px;
}
.block.high{order:-80}
.block.mid{order:-40}
.block.low{order:0}

.detail-panel{
  position:fixed;
  right:22px;
  bottom:22px;
  z-index:30;
  width:340px;
  padding:18px 20px;
  border-radius:24px;
  background:rgba(10,13,28,.82);
  border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(16px);
  box-shadow:0 0 42px rgba(124,58,237,.18);
}
.detail-panel h2{
  margin:0 0 14px;
  font-size:22px;
}
.row{
  display:flex;
  justify-content:space-between;
  gap:16px;
  margin:10px 0;
  font-size:14px;
}
.label{color:#b8b0d1}
.value{font-weight:900}
.badge{
  display:inline-flex;
  margin-top:12px;
  padding:10px 14px;
  border-radius:999px;
  background:rgba(251,146,60,.13);
  border:1px solid rgba(251,146,60,.28);
  color:#ffd7ba;
  font-size:13px;
  font-weight:900;
}
.open-link{
  display:inline-flex;
  margin-top:14px;
  padding:10px 14px;
  border-radius:999px;
  background:linear-gradient(135deg,#8b5cf6,#6d28d9);
  color:#fff;
  font-size:13px;
  font-weight:900;
}

@media(max-width:900px){
  .nav{
    flex-direction:column;
    align-items:flex-start;
  }
  .header-panel{
    grid-template-columns:1fr;
  }
  .stats{
    grid-template-columns:1fr 1fr;
  }
  .chaos-map{
    min-height:auto;
    justify-content:center;
    padding:12px;
    gap:7px;
  }
  .detail-panel{
    position:relative;
    right:auto;
    bottom:auto;
    width:auto;
    margin:16px 0 0;
  }
  .wolf{display:none}
}

@media(max-width:560px){
  .page{
    padding:18px 12px 32px;
  }
  .info-card h1{
    font-size:26px;
  }
  .stats{
    grid-template-columns:1fr;
  }
  .chaos-map{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    align-items:stretch;
  }
  .block{
    width:100%;
    height:auto;
    aspect-ratio:1/1;
    border-radius:16px;
  }
  .block.top{
    grid-column:span 2;
    aspect-ratio:2/1;
  }
}
</style>

const CHUNK_SIZE = 25;

function fmtUsd(n){
  if(!n || Number.isNaN(n)) return "$0.00";
  if(n >= 1e9) return "$" + (n / 1e9).toFixed(1) + "B";
  if(n >= 1e6) return "$" + (n / 1e6).toFixed(1) + "M";
  if(n >= 1e3) return "$" + (n / 1e3).toFixed(1) + "K";
  return "$" + n.toFixed(2);
}

function formatFee(percentValue){
  return percentValue.toFixed(2).replace(/\.00$/,"") + "%";
}

function getTokenName(label){
  return label.replace("ASTY/","").replace("ASTY / ","");
}

function chunkArray(arr,size){
  const chunks=[];
  for(let i=0;i<arr.length;i+=size) chunks.push(arr.slice(i,i+size));
  return chunks;
}

async function fetchGeckoChunk(chunk){
  const ids = chunk.map(([id]) => id).join(",");
  const encodedIds = encodeURIComponent(ids);
  const url = `https://api.geckoterminal.com/api/v2/networks/solana/pools/multi/${encodedIds}?include=base_token&include_volume_breakdown=false&include_composition=false`;
  const response = await fetch(url);
  const data = await response.json();
  return Array.isArray(data.data) ? data.data : [];
}

function getStatus(score){
  if(score >= 80) return "🔥 Chaos Zone";
  if(score >= 50) return "🟠 High Pressure";
  if(score >= 20) return "🟣 Active";
  return "🔵 Calm";
}

function getColors(score){
  if(score >= 80){
    return ["#ef4444","#f97316","rgba(239,68,68,.28)"];
  }
  if(score >= 50){
    return ["#f59e0b","#7c3aed","rgba(245,158,11,.22)"];
  }
  if(score >= 20){
    return ["#8b5cf6","#6d28d9","rgba(139,92,246,.18)"];
  }
  return ["#3b1b82","#1e1b4b","rgba(124,58,237,.12)"];
}

function getSize(score,index){
  const base = window.innerWidth <= 560 ? 92 : 54;
  const maxExtra = window.innerWidth <= 560 ? 0 : 188;
  const size = base + (score / 100) * maxExtra;

  if(index === 0 && window.innerWidth > 560) return Math.max(size,260);
  if(index < 3 && window.innerWidth > 560) return Math.max(size,190);
  return size;
}

function updatePanel(pool){
  if(!pool) return;
  document.getElementById("panelName").textContent = pool.label;
  document.getElementById("panelChaos").textContent = pool.chaosScore.toFixed(1) + "%";
  document.getElementById("panelFees").textContent = fmtUsd(pool.fees24h);
  document.getElementById("panelVolume").textContent = fmtUsd(pool.volume24h);
  document.getElementById("panelFeeRate").textContent = formatFee(pool.feePercent);
  document.getElementById("panelStatus").textContent = getStatus(pool.chaosScore);
  document.getElementById("panelLink").href = `https://www.geckoterminal.com/solana/pools/${pool.id}`;
}

function renderBlocks(rows){
  const map = document.getElementById("chaosMap");
  map.innerHTML = "";

  rows.forEach((row,index)=>{
    const size = getSize(row.chaosScore,index);
    const [c1,c2,glow] = getColors(row.chaosScore);
    const tokenSize = Math.max(10, Math.min(28, size * 0.16));
    const percentSize = Math.max(10, Math.min(24, size * 0.14));

    const block = document.createElement("button");
    block.className =
      "block " +
      (index === 0 ? "top" : row.chaosScore >= 80 ? "high" : row.chaosScore >= 50 ? "mid" : "low");

    block.style.setProperty("--s", size + "px");
    block.style.setProperty("--c1", c1);
    block.style.setProperty("--c2", c2);
    block.style.setProperty("--glow", row.chaosScore >= 80 ? "34px" : row.chaosScore >= 50 ? "24px" : "14px");
    block.style.setProperty("--glowColor", glow);
    block.style.setProperty("--tokenSize", tokenSize + "px");
    block.style.setProperty("--percentSize", percentSize + "px");

    block.innerHTML = `
      <div class="token">${getTokenName(row.label)}</div>
      <div class="percent">${Math.round(row.chaosScore)}%</div>
    `;

    block.addEventListener("click",()=>updatePanel(row));
    map.appendChild(block);
  });
}

async function load(){
  const statusLine = document.getElementById("statusLine");
  statusLine.textContent = "Loading GeckoTerminal pool data...";

  try{
    const chunks = chunkArray(pools,CHUNK_SIZE);
    const responses = await Promise.all(chunks.map(fetchGeckoChunk));
    const flatPools = responses.flat();

    const geckoMap = new Map();
    for(const item of flatPools){
      const address = item?.attributes?.address;
      if(address) geckoMap.set(address,item);
    }

    let rows = pools.map(([id,label,feePercent])=>{
      const item = geckoMap.get(id);
      if(!item) return null;

      const attrs = item.attributes || {};
      const fee = feePercent / 100;
      const volume24h = parseFloat(attrs.volume_usd?.h24 || "0");
      const fees24h = volume24h * fee;

      return {id,label,feePercent,volume24h,fees24h};
    }).filter(Boolean).sort((a,b)=>b.fees24h-a.fees24h);

    const highest = rows[0]?.fees24h || 0;
    const total = rows.reduce((sum,row)=>sum + row.fees24h,0);

    rows = rows.map(row=>({
      ...row,
      chaosScore: highest > 0 ? (row.fees24h / highest) * 100 : 0
    }));

    document.getElementById("systemOutput").textContent = fmtUsd(total);
    document.getElementById("topPool").textContent = rows[0]?.label || "-";
    statusLine.textContent = `Loaded ${rows.length} ASTY pools. Auto-updating every 60s.`;

    renderBlocks(rows);
    updatePanel(rows[0]);

  }catch(error){
    console.error(error);
    statusLine.textContent = "Error loading GeckoTerminal data.";
  }
}

load();
setInterval(load,60000);
window.addEventListener("resize",load);
</script>
